services:
  relay:
    build: .
    restart: unless-stopped
    environment:
      CODEX_REMOTE_RELAY_HOST: 0.0.0.0
      CODEX_REMOTE_RELAY_PORT: 8787
      CODEX_REMOTE_RELAY_PUBLIC_BASE_URL: https://${CODEX_REMOTE_DOMAIN}
      CODEX_REMOTE_RELAY_DB_PATH: /data/relay.sqlite3
      CODEX_REMOTE_RELAY_ENROLL_TOKEN: ${CODEX_REMOTE_RELAY_ENROLL_TOKEN}
      CODEX_REMOTE_RELAY_CLAIM_TTL_SECONDS: ${CODEX_REMOTE_RELAY_CLAIM_TTL_SECONDS:-900}
      CODEX_REMOTE_RELAY_AUTH_MAX_SKEW_SECONDS: ${CODEX_REMOTE_RELAY_AUTH_MAX_SKEW_SECONDS:-60}
      CODEX_REMOTE_RELAY_WS_HEARTBEAT_SECONDS: ${CODEX_REMOTE_RELAY_WS_HEARTBEAT_SECONDS:-20}
      CODEX_REMOTE_RELAY_MAX_CONCURRENT_CLIENTS: ${CODEX_REMOTE_RELAY_MAX_CONCURRENT_CLIENTS:-16384}
    volumes:
      - relay_data:/data
    expose:
      - "8787"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - relay
    ports:
      - "80:80"
      - "443:443"
    environment:
      CODEX_REMOTE_DOMAIN: ${CODEX_REMOTE_DOMAIN}
      CODEX_REMOTE_ACME_EMAIL: ${CODEX_REMOTE_ACME_EMAIL}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  relay_data:
  caddy_data:
  caddy_config:
