name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install --upgrade pip && pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests
  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build container
        run: docker build .
  deploy:
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: codex-remote-server-production
      cancel-in-progress: false
    steps:
      - name: Set up SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/known_hosts <<'EOF'
          |1|YlVLff6pbdvu+meY0OjXL/+SwxM=|N3FdOVAb/X57QzeL462OfaLOTtk= ssh-rsa 
          |1|MnrwxIH1nBzA1xi0G8EZRfO9i7M=|g3p8YXGplgi57EgmQv5hAUvaWU8= ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBGM+2TVtpCgrbUudFMDpfgPOxAP2OwO75dpegTZOTuB/Jsj0dg3cyBjb7k/waOuwH1TsdEFM95YLMBT9defY5GE=
          |1|Cf/cG7pEHdiHqVaDdiE8SXL1WSo=|JI0JLPdOfdGJ3KtwImNUGE4vF7s= ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINZMT7YHsS5qRX/ciXTbLxKZVCgpJS7m/L9Nwgr3RNZS
          EOF
      - name: Deploy to services.rousoftware.com
        run: |
          for attempt in 1 2 3 4 5; do
            if ssh -o ConnectTimeout=10 ege@services.rousoftware.com '
              set -euo pipefail
              cd /home/ege/apps/codex_remote_server
              git fetch --prune origin
              git checkout main
              git reset --hard "${{ github.sha }}"
              COMPOSE_PROJECT_NAME=codex_remote_server docker compose up -d --build
              local_ok=0
              for i in $(seq 1 20); do
                if curl -fsS --max-time 10 http://127.0.0.1:8787/healthz >/dev/null; then
                  local_ok=1
                  break
                fi
                sleep 2
              done
              test "$local_ok" -eq 1
              public_ok=0
              for i in $(seq 1 20); do
                if curl -fsS --max-time 15 https://cr.rousoftware.com/healthz >/dev/null; then
                  public_ok=1
                  break
                fi
                sleep 2
              done
              test "$public_ok" -eq 1
            '; then
              exit 0
            fi
            sleep 15
          done
          exit 1
